name: adavis-platform

services:
  mongodb:
    image: mongo:7.0
    container_name: adavis-mongodb
    restart: always
    ports:
      - "37017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Admin123!
      MONGO_INITDB_DATABASE: adavis_platform
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - adavis-network
    command: ["mongod", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--port", "27017"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: adavis-redis
    restart: always
    ports:
      - "8379:6379"
    command: redis-server --appendonly yes --requirepass Redis123! --port 6379
    volumes:
      - redis_data:/data
    networks:
      - adavis-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Redis123!", "--raw", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.4
    container_name: adavis-redpanda
    restart: always
    ports:
      - "10092:9092"
      - "9644:9644"
    command:
      - redpanda
      - start
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --mode dev-container
      - --smp 1
      - --memory 1G
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - adavis-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    image: adavis/auth-service:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${AUTH_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS}
      AUDIT_SERVICE_BASE_URL: http://audit-service:8084
      MDM_SERVICE_BASE_URL: http://mdm-service:9083
      LICENSE_SERVICE_BASE_URL: http://license-service:8082
    networks:
      - adavis-network

  mdm-service:
    build:
      context: ../services/mdm-service
      dockerfile: Dockerfile
    image: adavis/mdm-service:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${MDM_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_SERVICE_BASE_URL: http://auth-service:9081
      LICENSE_SERVICE_BASE_URL: http://license-service:8082
      AUDIT_SERVICE_BASE_URL: http://audit-service:8084
      DMS_STORAGE_PROVIDER: ${DMS_STORAGE_PROVIDER}
      DMS_STORAGE_LOCAL_ROOT_PATH: ${DMS_STORAGE_LOCAL_ROOT_PATH}
      DMS_STORAGE_CLOUD_ROOT_PATH: ${DMS_STORAGE_CLOUD_ROOT_PATH}
      DMS_STORAGE_CLOUD_BUCKET: ${DMS_STORAGE_CLOUD_BUCKET}
      DMS_DOWNLOAD_URL_TTL_MINUTES: ${DMS_DOWNLOAD_URL_TTL_MINUTES}
    volumes:
      - ../services/mdm-service/data:/app/data
    networks:
      - adavis-network

  iiot-service:
    build:
      context: ../services/iiot-service
      dockerfile: Dockerfile
    image: adavis/iiot-service:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${IIOT_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - adavis-network

  license-service:
    build:
      context: ../services/license-service
      dockerfile: Dockerfile
    image: adavis/license-service:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${LICENSE_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LICENSE_PUBLIC_KEY_PATH: /opt/adavis/keys/public_key.pem
      AUDIT_SERVICE_URL: http://audit-service:8084
      AUDIT_ENDPOINT: /internal/v1/audit/logs
    volumes:
      - ../license_generation_module/keys:/opt/adavis/keys:ro
    networks:
      - adavis-network

  audit-service:
    build:
      context: ../services/audit-service
      dockerfile: Dockerfile
    image: adavis/audit-service:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${AUDIT_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC_AUDIT: ${KAFKA_TOPIC_AUDIT}
      AUDIT_PORT: 8084
    networks:
      - adavis-network

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    image: adavis/api-gateway:aws
    restart: always
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env.aws
    environment:
      SPRING_PROFILES_ACTIVE: aws
      JAVA_OPTS: ${GATEWAY_JAVA_OPTS:-"-XX:MaxRAMPercentage=70 -XX:+UseG1GC"}
      JWT_SECRET: ${JWT_SECRET}
      MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://admin:Admin123!@mongodb:27017/adavis_platform?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GATEWAY_AUTH_SERVICE_URI: http://auth-service:9081
      GATEWAY_LICENSE_SERVICE_URI: http://license-service:8082
      GATEWAY_AUDIT_SERVICE_URI: http://audit-service:8084
      GATEWAY_MDM_SERVICE_URI: http://mdm-service:9083
      GATEWAY_IIOT_SERVICE_URI: http://iiot-service:9085
      MDM_SERVICE_BASE_URL: http://mdm-service:9083
      LICENSE_SERVICE_BASE_URL: http://license-service:8082
    ports:
      - "80:9080"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      auth-service:
        condition: service_started
      mdm-service:
        condition: service_started
      license-service:
        condition: service_started
      audit-service:
        condition: service_started
      iiot-service:
        condition: service_started
    networks:
      - adavis-network

networks:
  adavis-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  redpanda_data:
    driver: local
