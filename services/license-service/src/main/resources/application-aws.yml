spring:
  config:
    activate:
      on-profile: aws

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

license:
  jwt:
    public-key-path: ${LICENSE_PUBLIC_KEY_PATH:/opt/adavis/keys/public_key.pem}

audit:
  enabled: ${AUDIT_ENABLED:true}
  service-url: ${AUDIT_SERVICE_URL:http://audit-service:8084}
  endpoint: ${AUDIT_ENDPOINT:/internal/v1/audit/logs}

logging:
  level:
    com.adavis: INFO
    org.springframework.data.mongodb: INFO
