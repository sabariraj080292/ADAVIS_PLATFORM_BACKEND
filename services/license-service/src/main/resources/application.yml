spring:
  application:
    name: license-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:Admin123!@localhost:37017/adavis_platform?authSource=admin}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:8379}
      password: ${REDIS_PASSWORD:Redis123!}
      timeout: 60000ms

server:
  port: ${LICENSE_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.adavis: DEBUG
    org.springframework.data.mongodb: DEBUG

license:
  jwt:
    issuer: ${LICENSE_JWT_ISSUER:ADAVIS}
    public-key-path: ${LICENSE_PUBLIC_KEY_PATH:../../license_generation_module/keys/public_key.pem}

audit:
  enabled: ${AUDIT_ENABLED:true}
  service-url: ${AUDIT_SERVICE_URL:http://localhost:8084}
  endpoint: ${AUDIT_ENDPOINT:/internal/v1/audit/logs}

---
spring:
  config:
    activate:
      on-profile: docker

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/adavis_license_db}
    redis:
      host: ${REDIS_HOST:redis}