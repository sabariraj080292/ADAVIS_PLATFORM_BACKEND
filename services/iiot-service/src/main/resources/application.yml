server:
  port: 9085
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: iiot-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://admin:Admin123!@localhost:37017/adavis_platform?authSource=admin}
      auto-index-creation: false
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:8379}
      password: ${REDIS_PASSWORD:Redis123!}
      timeout: 5000ms

logging:
  level:
    com.adavis.iiot: DEBUG
    org.springframework.data.mongodb: INFO

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-secret-key-256-bits-minimum!}
  expiration: 3600000
  refresh-expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info